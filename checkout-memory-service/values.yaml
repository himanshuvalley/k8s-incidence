replicaCount: 1

nameOverride: ""
fullnameOverride: "checkout-memory-service"

image:
  repository: "incidence.azurecr.io/checkout-memory-service"
  tag: "1.0.0"
  pullPolicy: Always

imageCredentials:
  enabled: true
  secretName: "registry-pull-secret"
  registry: "incidence.azurecr.io"
  username: ""
  password: ""
  email: "devops@example.com"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
