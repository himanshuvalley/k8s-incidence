apiVersion: v1
kind: Service
metadata:
  name: {{ include "document-storage-service.fullname" . }}
  labels:
    app: document-storage-service
spec:
  type: {{ .Values.service.type }}
  selector:
    app: document-storage-service
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
